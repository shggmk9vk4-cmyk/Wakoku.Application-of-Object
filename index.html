<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAO! - 和国物品アプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f1f5f9;         /* クリーンで明るい背景（薄いグレー） */
            --bg-card: #ffffff;         /* 高級感のある白カード */
            --brand-primary: #0066cc;   /* 深みのある先進的なテックブルー */
            --brand-success: #10b981;   /* 鮮やかなエメラルドグリーン */
            --brand-purple: #7c3aed;    /* 洗練されたバイオレット */
            --brand-danger: #ef4444;    /* 警告用のスマートなレッド */
            --text-main: #1e293b;       /* 視認性の高いダークスレート */
            --text-muted: #64748b;      /* 落ち着いたニュアンスグレー */
            --border-light: #e2e8f0;    /* 繊細な境界線カラー */
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 100px 16px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ⏳ 同期ローディング画面 */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(241, 245, 249, 0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .cyber-spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border-light);
            border-top-color: var(--brand-primary);
            border-bottom-color: var(--brand-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--brand-primary); margin-top: 16px; font-weight: 700; letter-spacing: 1px; font-size: 0.9em; }

        /* ⚡ スタイリッシュヘッダー */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: var(--bg-card); border-radius: 16px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
            margin-bottom: 16px;
        }
        .logo { font-size: 1.4em; font-weight: 800; color: var(--brand-primary); letter-spacing: -0.5px; }
        .logo span { font-size: 0.55em; color: var(--text-muted); font-weight: 500; margin-left: 6px; letter-spacing: 0; }
        .sync-badge { font-size: 0.75em; font-weight: 700; color: var(--brand-primary); background: rgba(0,102,204,0.08); padding: 5px 12px; border-radius: 20px; }

        /* 🎛️ コントロールパネル */
        .panel {
            background: var(--bg-card); border-radius: 20px; padding: 20px;
            border: 1px solid var(--border-light); margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04);
        }
        .panel-title { font-size: 0.85em; font-weight: 700; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 14px; }

        /* セレクター（入力欄）の高級感あるデザイン */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        select, input {
            width: 100%; padding: 14px; background: #f8fafc; border: 1px solid var(--border-light);
            border-radius: 12px; color: var(--text-main); font-size: 0.95em; font-family: inherit;
            font-weight: 700; box-sizing: border-box; transition: var(--transition);
            -webkit-appearance: none; appearance: none;
        }
        select:focus, input:focus {
            border-color: var(--brand-primary); outline: none; background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0,102,204,0.1);
        }

        /* 👥 区分カスタムセグメントボタン */
        .group-toggles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
        .toggle-btn {
            padding: 12px 2px; font-size: 0.85em; text-align: center; background: #f8fafc;
            border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer; color: var(--text-muted);
            font-weight: 700; transition: var(--transition);
        }
        .toggle-btn.active {
            color: #ffffff; background: var(--brand-primary); border-color: var(--brand-primary);
            box-shadow: 0 4px 10px rgba(0,102,204,0.25);
        }

        /* 📦 物品選択カード */
        .item-grid { display: flex; flex-direction: column; gap: 12px; }
        .item-card {
            background: #f8fafc; border: 1px solid var(--border-light);
            border-radius: 16px; padding: 16px; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
        }
        .item-card.selected {
            border-color: var(--theme-color, var(--brand-primary));
            background: #ffffff;
            box-shadow: 0 6px 20px var(--theme-glow, rgba(0,102,204,0.06));
        }
        .item-info { flex: 1; }
        .item-name { font-size: 1.05em; font-weight: 700; margin: 0 0 4px 0; color: var(--text-main); }
        .item-stock { font-size: 0.8em; color: var(--text-muted); font-weight: 500; margin: 0; }
        .user-loan-badge { display: inline-block; font-size: 0.75em; font-weight: 700; color: var(--brand-danger); margin-top: 6px; }

        /* カウンターUI */
        .counter-group { display: flex; align-items: center; gap: 16px; }
        .counter-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border-light);
            background: #ffffff; color: var(--text-main); font-size: 1.2em; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .counter-btn:active { transform: scale(0.9); background: #f1f5f9; }
        .count-display { font-size: 1.3em; font-weight: 800; min-width: 28px; text-align: center; }

        /* 🚀 メインアクションボタン */
        .action-container { margin-top: 24px; }
        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 1.05em; font-weight: 700; color: #ffffff; cursor: pointer;
            background: var(--brand-primary); box-shadow: 0 6px 16px rgba(0,102,204,0.3);
            letter-spacing: 1px; transition: var(--transition);
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.95; }

        /* 📊 在庫リスト表示項目 */
        .status-row {
            padding: 16px; border-radius: 14px; background: #f8fafc; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border-light); border-left: 5px solid var(--brand-success);
        }
        .status-row.out { border-left-color: var(--brand-danger); }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 0.8em; font-weight: 700; }
        .badge.in { background: rgba(16,185,129,0.1); color: var(--brand-success); }
        .badge.out { background: rgba(239,68,110,0.1); color: var(--brand-danger); }

        /* 📋 クラス・団体別の未返却状況カード */
        .class-card {
            background: #f8fafc; border-radius: 14px; padding: 16px; margin-bottom: 10px;
            border: 1px solid var(--border-light); border-left: 5px solid var(--brand-purple);
        }

        /* 🗺️ ボトムナビゲーション（スマートでフラットな質感） */
        .nav-dock {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 72px;
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-light); display: flex; z-index: 5000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
        }
        .nav-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; transition: var(--transition); font-size: 0.75em; font-weight: 700; gap: 4px;
        }
        .nav-tab span { font-size: 1.4em; transition: var(--transition); }
        .nav-tab.active { color: var(--active-color, var(--brand-primary)); }
        .nav-tab.active span { transform: translateY(-2px); }

        /* 📋 最終確認モーダルダイアログ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(6px); z-index: 9000;
        }
        .modal-body {
            background: var(--bg-card); width: 90%; max-width: 400px; margin: 60px auto;
            border-radius: 24px; padding: 24px; border: 1px solid var(--border-light);
            box-sizing: border-box; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
        }
        .modal-header { font-size: 1.15em; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 12px; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="cyber-spinner"></div>
        <div id="loader-text" class="loader-text">データを同期中...</div>
    </div>

    <div class="app-header">
        <div class="logo">WAO!<span>和国物品アプリ</span></div>
        <div id="sync-status" class="sync-badge">接続中</div>
    </div>

    <div id="sec-action" class="panel">
        <div id="panel-action-title" class="panel-title">現在のモード: 物品の貸出申請</div>
        
        <div class="group-toggles">
            <div id="g-class" class="toggle-btn active" onclick="changeGroup('class')">クラス</div>
            <div id="g-vun" class="toggle-btn" onclick="changeGroup('vun')">文実</div>
            <div id="g-comm" class="toggle-btn" onclick="changeGroup('comm')">委員会</div>
            <div id="g-club" class="toggle-btn" onclick="changeGroup('club')">部活</div>
        </div>

        <div id="group-selectors">
            <div id="box-vun" style="display:none; margin-bottom:12px;"><select id="sel-vun"></select></div>
            <div id="box-comm" style="display:none; margin-bottom:12px;"><select id="sel-comm"></select></div>
            <div id="box-club" style="display:none; margin-bottom:12px;"><select id="sel-club"></select></div>
            
            <div class="grid-select">
                <select id="sel-grade" onchange="onUserChange()"><option>1年</option><option>2年</option><option>3年</option></select>
                <select id="sel-hr" onchange="onUserChange()"></select>
            </div>
            <select id="sel-no" onchange="fetchUserCurrentLoans()">
                <option value="">出席番号を選択してください</option>
            </select>
        </div>

        <div class="panel-title" style="margin-top:24px;">物品を選択</div>
        <div id="action-item-list" class="item-grid"></div>

        <div class="action-container">
            <button id="btn-trigger" class="btn-main" onclick="openConfirmation()">選択した内容を確認する</button>
        </div>
    </div>

    <div id="sec-dashboard" class="panel" style="display:none;">
        <div class="panel-title">リアルタイム在庫状況</div>
        <input type="text" id="db-search" placeholder="物品名で検索..." oninput="drawDashboard()" style="margin-bottom:16px;">
        <div id="db-list"></div>
    </div>

    <div id="sec-status" class="panel" style="display:none;">
        <div class="panel-title" id="class-status-header">未返却物品一覧</div>
        <div id="class-status-list"></div>
    </div>

    <div class="nav-dock">
        <div id="tab-loan" class="nav-tab active" onclick="switchView('loan')"><span>📥</span>借りる</div>
        <div id="tab-return" class="nav-tab" onclick="switchView('return')"><span>📤</span>返却する</div>
        <div id="tab-dash" class="nav-tab" onclick="switchView('dashboard')"><span>📊</span>在庫を見る</div>
        <div id="tab-status" class="nav-tab" onclick="switchView('status')"><span>📋</span>未返却ログ</div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-body">
            <div id="modal-indicator" class="modal-header" style="color:var(--brand-primary);">申請内容の最終確認</div>
            <div style="font-size:0.8em; color:var(--text-muted); margin-bottom:4px; font-weight:700;">申請者</div>
            <div id="conf-user" style="font-size:1.1em; font-weight:bold; margin-bottom:16px; color:var(--text-main);"></div>
            
            <div style="font-size:0.8em; color:var(--text-muted); margin-bottom:8px; font-weight:700;">対象物品リスト</div>
            <div id="conf-items" style="display:flex; flex-direction:column; gap:8px; margin-bottom:24px;"></div>
            
            <button id="btn-modal-submit" class="btn-main" onclick="submitDataToBackend()">この内容で確定する</button>
            <button onclick="document.getElementById('confirm-modal').style.display='none'" style="width:100%; background:none; border:none; color:var(--brand-danger); margin-top:16px; cursor:pointer; font-weight:700; font-size:0.95em;">キャンセルして戻る</button>
        </div>
    </div>

    <script>
        // 🛠️ ここに作成したGASのデプロイURLを入力してください
        const API_URL = "https://script.google.com/macros/s/AKfycbzDwFwBuyUmmA9pvUA4bXwKRwwaNxZ1SVpsbF1chyw9WFI1CCXr8dzKErOKh7io7sWOlA/exec";

        // 団体選択マスタデータ
        const GROUPS = {
            vun: ["OP･ED", "体育館ステージ", "装飾", "門制作", "野外ステージ", "後夜祭", "バンド", "本部"],
            comm: ["図書委員会", "国際理解委員会", "放送委員会", "生活委員会"],
            club: ["吹奏楽部", "美術部", "茶道部", "演劇部", "写真部", "情報技術研究部", "ハンドメイド部"]
        };

        let appState = {
            mode: 'loan', 
            groupType: 'class',
            masterItems: [],
            activeUserLoans: {},
            cachedAllLoans: {}
        };

        // 初期化処理
        function initApp() {
            const fill = (id, arr) => {
                document.getElementById(id).innerHTML = '<option value="">所属・係を選択</option>' + arr.map(v => `<option value="${v}">${v}</option>`).join('');
            };
            fill('sel-vun', GROUPS.vun); fill('sel-comm', GROUPS.comm); fill('sel-club', GROUPS.club);
            
            const hr = document.getElementById('sel-hr');
            for(let i=1; i<=8; i++) hr.innerHTML += `<option>${i}組</option>`;
            
            const no = document.getElementById('sel-no');
            for(let i=1; i<=40; i++) no.innerHTML += `<option value="${i}">${i}番</option>`;

            switchView('loan');
            syncSystemData();
            setInterval(syncSystemData, 20000); // 20秒ごとの自動データ同期
        }

        // 🔄 データベースとの高速同期
        async function syncSystemData() {
            document.getElementById('sync-status').innerText = "同期中...";
            try {
                const resItems = await fetch(`${API_URL}?action=getItems`);
                appState.masterItems = await resItems.json();

                const resAllLoans = await fetch(`${API_URL}?action=getAllLoans`);
                appState.cachedAllLoans = await resAllLoans.json();

                document.getElementById('sync-status').innerText = "接続中";
                
                if(appState.mode === 'dashboard') drawDashboard();
                else if(appState.mode === 'status') drawClassStatus();
                else drawActionItems();
            } catch(e) {
                document.getElementById('sync-status').innerText = "オフライン";
            }
        }

        // 👁️ 表示モード切り替え
        function switchView(targetMode) {
            appState.mode = targetMode;
            
            const tabs = { loan: 'tab-loan', return: 'tab-return', dashboard: 'tab-dash', status: 'tab-status' };
            Object.keys(tabs).forEach(k => document.getElementById(tabs[k]).classList.remove('active'));
            
            document.getElementById('sec-action').style.display = (targetMode === 'loan' || targetMode === 'return') ? 'block' : 'none';
            document.getElementById('sec-dashboard').style.display = (targetMode === 'dashboard') ? 'block' : 'none';
            document.getElementById('sec-status').style.display = (targetMode === 'status') ? 'block' : 'none';

            const activeTab = document.getElementById(tabs[targetMode]);
            if(targetMode === 'loan') {
                activeTab.style.setProperty('--active-color', 'var(--brand-primary)');
                document.getElementById('panel-action-title').innerText = "現在のモード: 物品の貸出申請";
                document.getElementById('btn-trigger').style.background = 'var(--brand-primary)';
                document.getElementById('btn-trigger').style.boxShadow = '0 6px 16px rgba(0,102,204,0.3)';
            } else if(targetMode === 'return') {
                activeTab.style.setProperty('--active-color', 'var(--brand-success)');
                document.getElementById('panel-action-title').innerText = "現在のモード: 物品の返却手続き";
                document.getElementById('btn-trigger').style.background = 'var(--brand-success)';
                document.getElementById('btn-trigger').style.boxShadow = '0 6px 16px rgba(16,185,129,0.3)';
            } else if(targetMode === 'dashboard') {
                activeTab.style.setProperty('--active-color', 'var(--brand-purple)');
                drawDashboard();
            } else if(targetMode === 'status') {
                activeTab.style.setProperty('--active-color', 'var(--brand-purple)');
                drawClassStatus();
            }

            if(targetMode === 'loan' || targetMode === 'return') drawActionItems();
        }

        function changeGroup(g) {
            appState.groupType = g;
            ['class', 'vun', 'comm', 'club'].forEach(id => document.getElementById('g-'+id).classList.remove('active'));
            document.getElementById('g-'+g).classList.add('active');
            
            document.getElementById('box-vun').style.display = (g === 'vun') ? 'block' : 'none';
            document.getElementById('box-comm').style.display = (g === 'comm') ? 'block' : 'none';
            document.getElementById('box-club').style.display = (g === 'club') ? 'block' : 'none';
            onUserChange();
        }

        function onUserChange() {
            fetchUserCurrentLoans();
            if(appState.mode === 'status') drawClassStatus();
        }

        function getUserPrefix() {
            const g = document.getElementById('sel-grade').value;
            const h = document.getElementById('sel-hr').value;
            const base = `${g}${h}`;
            if(appState.groupType === 'vun') return `文実[${document.getElementById('sel-vun').value}] ${base}`;
            if(appState.groupType === 'comm') return `委員会[${document.getElementById('sel-comm').value}] ${base}`;
            if(appState.groupType === 'club') return `部活[${document.getElementById('sel-club').value}] ${base}`;
            return base;
        }

        function getFullUsername() {
            const no = document.getElementById('sel-no').value;
            return no ? `${getUserPrefix()}(${no}番)` : "";
        }

        async function fetchUserCurrentLoans() {
            const user = getFullUsername();
            if(!user) return;
            try {
                const res = await fetch(`${API_URL}?action=getUserLoans&user=${encodeURIComponent(user)}`);
                appState.activeUserLoans = await res.json();
                drawActionItems();
            } catch(e) {}
        }

        // 📥 📤 リスト描画処理
        function drawActionItems() {
            const container = document.getElementById('action-item-list');
            if(appState.masterItems.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding:10px;">データを読み込んでいます...</div>`;
                return;
            }

            const color = appState.mode === 'loan' ? 'var(--brand-primary)' : 'var(--brand-success)';
            const glow = appState.mode === 'loan' ? 'rgba(0,102,204,0.06)' : 'rgba(16,185,129,0.06)';

            let renderedCount = 0;
            container.innerHTML = appState.masterItems.map((item, index) => {
                const holdingQty = appState.activeUserLoans[item.name] || 0;
                if(appState.mode === 'return' && holdingQty <= 0) return ''; 
                renderedCount++;

                return `
                    <div class="item-card" id="card-${index}" style="--theme-color:${color}; --theme-glow:${glow}">
                        <div class="item-info">
                            <p class="item-name">${item.name}</p>
                            <p class="item-stock">現在の貸出可能数: ${item.stock}</p>
                            ${holdingQty > 0 ? `<span class="user-loan-badge">現在借りている数量: ${holdingQty}</span>` : ''}
                        </div>
                        <div class="counter-group">
                            <button class="counter-btn" onclick="stepCount(${index}, -1)">-</button>
                            <span id="qty-${index}" class="count-display">0</span>
                            <button class="counter-btn" onclick="stepCount(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            if(appState.mode === 'return' && renderedCount === 0) {
                container.innerHTML = `<div style="color:var(--brand-success); text-align:center; padding:20px; font-weight:bold;">🎉 このアカウントが現在借りている物品はありません</div>`;
            }
        }

        function stepCount(idx, delta) {
            const el = document.getElementById(`qty-${idx}`);
            let current = parseInt(el.innerText) + delta;
            const max = appState.mode === 'loan' ? appState.masterItems[idx].stock : (appState.activeUserLoans[appState.masterItems[idx].name] || 0);

            if(current < 0 || current > max) return;
            el.innerText = current;

            const card = document.getElementById(`card-${idx}`);
            if(current > 0) card.classList.add('selected');
            else card.classList.remove('selected');
        }

        // 📊 在庫一覧の描画
        function drawDashboard() {
            const container = document.getElementById('db-list');
            const search = document.getElementById('db-search').value.toLowerCase().trim();
            
            const filtered = appState.masterItems.filter(it => it.name.toLowerCase().includes(search));
            if(filtered.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted); padding:10px;">該当する物品が見つかりませんでした</div>`;
                return;
            }

            container.innerHTML = filtered.map(item => {
                const isOut = item.stock <= 0;
                return `
                    <div class="status-row ${isOut ? 'out' : ''}">
                        <span style="font-weight:700;">${item.name}</span>
                        <span class="badge ${isOut ? 'out' : 'in'}">${isOut ? '在庫切れ' : `残り: ${item.stock}`}</span>
                    </div>
                `;
            }).join('');
        }

        // 📋 グループ別未返却状況の集計描画
        function drawClassStatus() {
            const container = document.getElementById('class-status-list');
            const prefix = getUserPrefix();
            document.getElementById('class-status-header').innerText = `${prefix} の未返却状況`;

            let aggregate = {};
            let found = false;

            for(const user in appState.cachedAllLoans) {
                if(user.startsWith(prefix)) {
                    const items = appState.cachedAllLoans[user];
                    for(const name in items) {
                        if(items[name] > 0) {
                            aggregate[name] = (aggregate[name] || 0) + items[name];
                            found = true;
                        }
                    }
                }
            }

            if(!found) {
                container.innerHTML = `<div style="color:var(--brand-success); text-align:center; padding:30px; font-weight:bold;">✨ すべて返却済みです。未返却の物品はありません</div>`;
                return;
            }

            container.innerHTML = Object.keys(aggregate).map(name => `
                <div class="class-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:var(--text-main);">📌 ${name}</span>
                        <span style="color:var(--brand-danger); font-weight:bold; font-size:1.1em;">合計 ${aggregate[name]} 個</span>
                    </div>
                </div>
            `).join('');
        }

        // 📋 確認画面ポップアップ
        function openConfirmation() {
            if(!document.getElementById('sel-no').value) return alert("出席番号を選択してください");
            
            const selected = [];
            appState.masterItems.forEach((item, i) => {
                const val = parseInt(document.getElementById(`qty-${i}`)?.innerText || 0);
                if(val > 0) selected.push({ name: item.name, qty: val });
            });

            if(selected.length === 0) return alert("数量を1つ以上選択してください");

            document.getElementById('conf-user').innerText = getFullUsername();
            
            const indicator = document.getElementById('modal-indicator');
            if(appState.mode === 'loan') {
                indicator.innerText = "申請：貸出手続きの確定";
                indicator.style.color = "var(--brand-primary)";
            } else {
                indicator.innerText = "申請：返却手続きの確定";
                indicator.style.color = "var(--brand-success)";
            }

            document.getElementById('conf-items').innerHTML = selected.map(it => `
                <div style="display:flex; justify-content:space-between; border-bottom:1px dashed var(--border-light); padding-bottom:8px; font-weight:700;">
                    <span>👉 ${it.name}</span>
                    <span style="color:${appState.mode === 'loan'?'var(--brand-primary)':'var(--brand-success)'};">${it.qty} 個</span>
                </div>
            `).join('');

            appState.pendingData = { user: getFullUsername(), type: appState.mode, items: selected };
            document.getElementById('confirm-modal').style.display = 'block';
        }

        // 🚀 スレッド通信実行
        async function submitDataToBackend() {
            document.getElementById('confirm-modal').style.display = 'none';
            document.getElementById('loader-text').innerText = "データをスプレッドシートに送信中...";
            document.getElementById('loader').style.display = 'flex';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(appState.pendingData)
                });
                alert("手続きが正常に完了しました！");
                location.reload();
            } catch(e) {
                alert("通信エラー：送信に失敗しました。電波の良い所で再度お試しください。");
                document.getElementById('loader').style.display = 'none';
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
